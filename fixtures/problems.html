  <!-- Fixture helper: stamp due-date cells relative to the real "now" so
       urgent / normal / past states are all exercised. -->
  <script>
    for (const td of document.querySelectorAll('td[data-due-offset-hours]')) {
      const due = new Date(Date.now() + Number(td.dataset.dueOffsetHours) * 3600000);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let hours = due.getHours();
      const meridiem = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      td.textContent = `${String(due.getDate()).padStart(2, '0')} ${months[due.getMonth()]}, ` +
        `${hours}:${String(due.getMinutes()).padStart(2, '0')} ${meridiem}`;
    }
  </script>
